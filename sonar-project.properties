sonar.projectKey=idaliopessoa_gospelviral
sonar.organization=idaliopessoa
sonar.host.url=https://sonarcloud.io
sonar.sources=apps/web/src,apps/server/src,packages/shared/src
sonar.tests=apps/web/src,apps/server/src,packages/shared/src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/__tests__/**
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info,apps/server/coverage/lcov.info,packages/shared/coverage/lcov.info
sonar.sourceEncoding=UTF-8

# Hand-driven smoke scripts are deliberately not covered by unit tests
# (they bill the real Anthropic account, gated behind --yes). Excluded
# from analysis entirely so they neither drag coverage nor surface lint
# noise on the manual entry point.
sonar.exclusions=apps/server/scripts/**

# Per DEC_010: JSDoc typedefs (in packages/shared/src/types.js) document the
# component prop contract instead of runtime PropTypes. The project is
# intentionally TS-free; runtime prop validation would be dead weight.
# Per DEC_011: bare-text-next-to-control accessibility labels are tracked as a
# roadmap item, not blocking until the design pass.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S6774
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S6853
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*
